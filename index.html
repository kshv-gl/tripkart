<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripKart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <h1>TripKart</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="login.html">Login/Signup</a>
    <a href="info.html">About</a>
    
  </div>
</nav>

<section class="hero">
  <video autoplay muted loop class="bg-video">
    <source src="components/5329316-uhd_4096_2160_25fps.mp4" type="video/mp4">
  </video>
  <div class="hero-content">
    <h2>Explore Trips Around the World</h2>
    <p>Find your next destination easily</p>
  </div>
</section>

<div class="controls">

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search destinations, trips..." />
  </div>

  <div class="filters">
    <select id="filterType">
      <option value="all">All Trips</option>
      <option value="Solo Trip">Solo Trip</option>
      <option value="Group Trip">Group Trip</option>
    </select>

    <select id="sortPrice">
      <option value="default">Sort</option>
      <option value="low">Price: Low → High</option>
      <option value="high">Price: High → Low</option>
    </select>
  </div>

</div>

<div id="loader" class="loader">Loading...</div>
<div id="tripContainer" class="grid"></div>

<script src="app.js"></script>
</body>
</html>
